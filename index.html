<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church Bible Review</title>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// --- Your Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyB_s-sIVQDCpmnSuqvVIVWRmy_cta8myoM",
  authDomain: "church-bible-review.firebaseapp.com",
  projectId: "church-bible-review",
  storageBucket: "church-bible-review.firebasestorage.app",
  messagingSenderId: "53543883622",
  appId: "1:53543883622:web:95cb620a9bd60c0abb2ea7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- Elements ---
const nameInput = document.getElementById("name");
const bookSelect = document.getElementById("book");
const chapterSelect = document.getElementById("chapter");
const reviewInput = document.getElementById("review");
const submitBtn = document.getElementById("submit");
const adminBtn = document.getElementById("adminBtn");
const adminPanel = document.getElementById("adminPanel");
const closeAdminBtn = document.getElementById("closeAdmin");
const submissionsDiv = document.getElementById("submissions");

// --- Bible Books & Chapters ---
const bibleBooks = {
  "Genesis": 50, "Exodus": 40, "Leviticus": 27, "Numbers": 36, "Deuteronomy": 34,
  "Joshua": 24, "Judges": 21, "Ruth": 4, "1 Samuel": 31, "2 Samuel": 24,
  "1 Kings": 22, "2 Kings": 25, "1 Chronicles": 29, "2 Chronicles": 36,
  "Ezra": 10, "Nehemiah": 13, "Esther": 10, "Job": 42, "Psalms": 150,
  "Proverbs": 31, "Ecclesiastes": 12, "Song of Solomon": 8, "Isaiah": 66,
  "Jeremiah": 52, "Lamentations": 5, "Ezekiel": 48, "Daniel": 12,
  "Hosea": 14, "Joel": 3, "Amos": 9, "Obadiah": 1, "Jonah": 4,
  "Micah": 7, "Nahum": 3, "Habakkuk": 3, "Zephaniah": 3,
  "Haggai": 2, "Zechariah": 14, "Malachi": 4, "Matthew": 28,
  "Mark": 16, "Luke": 24, "John": 21, "Acts": 28,
  "Romans": 16, "1 Corinthians": 16, "2 Corinthians": 13, "Galatians": 6,
  "Ephesians": 6, "Philippians": 4, "Colossians": 4, "1 Thessalonians": 5,
  "2 Thessalonians": 3, "1 Timothy": 6, "2 Timothy": 4, "Titus": 3,
  "Philemon": 1, "Hebrews": 13, "James": 5, "1 Peter": 5, "2 Peter": 3,
  "1 John": 5, "2 John": 1, "3 John": 1, "Jude": 1, "Revelation": 22
};

// Populate books dropdown
for (let book in bibleBooks) {
  let option = document.createElement("option");
  option.value = book;
  option.textContent = book;
  bookSelect.appendChild(option);
}

// Update chapters dropdown
bookSelect.addEventListener("change", () => {
  chapterSelect.innerHTML = "";
  const chapters = bibleBooks[bookSelect.value];
  for (let i = 1; i <= chapters; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    chapterSelect.appendChild(option);
  }
});

// Submit review
submitBtn.addEventListener("click", async () => {
  if (!nameInput.value || !reviewInput.value) {
    alert("Please enter your name and review!");
    return;
  }
  await addDoc(collection(db, "reviews"), {
    name: nameInput.value,
    book: bookSelect.value,
    chapter: chapterSelect.value,
    review: reviewInput.value,
    date: new Date()
  });
  alert("Submitted!");
  nameInput.value = "";
  reviewInput.value = "";
});

// Admin panel toggle
adminBtn.addEventListener("click", async () => {
  adminPanel.style.display = "block";
  submissionsDiv.innerHTML = "Loading...";
  const querySnapshot = await getDocs(collection(db, "reviews"));
  submissionsDiv.innerHTML = "";
  querySnapshot.forEach((doc) => {
    const r = doc.data();
    submissionsDiv.innerHTML += `<p><b>${r.name}</b> (${r.book} ${r.chapter}): ${r.review}</p>`;
  });
});

closeAdminBtn.addEventListener("click", () => {
  adminPanel.style.display = "none";
});
</script>

<!-- Colorful CSS -->
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin:0; padding:0;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  color: #333;
}
h1 {
  text-align:center;
  color:#fff;
  text-shadow: 2px 2px 4px #00000050;
  margin-bottom:20px;
}
label { display:block; margin-top:15px; font-weight:bold; color:#fff; }
select,input,textarea {
  width:100%; padding:10px; margin-top:5px;
  border-radius:12px; border:none; outline:none;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
}
select { background: #ffe0b2; }
input { background: #fff3e0; }
textarea { background: #fff3e0; resize:none; }

button {
  padding:12px 20px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background: linear-gradient(90deg,#ff758c,#ff7eb3);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 3px 3px 15px rgba(0,0,0,0.4);
}

#adminBtn {
  position:fixed; top:15px; right:15px;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  border-radius:50%;
  width:50px; height:50px;
  font-size:24px; color:#fff;
  box-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

#adminPanel {
  display:none;
  position:fixed;
  top:10px; right:10px;
  background:#ffffffdd;
  border-radius:12px;
  padding:20px;
  max-height:80vh;
  width:320px;
  overflow-y:auto;
  box-shadow:3px 3px 20px rgba(0,0,0,0.3);
  z-index:100;
}

#closeAdmin {
  margin-top:10px;
  background: linear-gradient(90deg,#ff416c,#ff4b2b);
  color:#fff;
  width:100%;
}
p { background:#ffe0b2; padding:8px; border-radius:8px; margin-bottom:5px; }
</style>
</head>

<body>
<h1>Church Bible Review</h1>

<label>Name:</label>
<input type="text" id="name" placeholder="Your name">

<label>Book:</label>
<select id="book"></select>

<label>Chapter:</label>
<select id="chapter"></select>

<label>Review:</label>
<textarea id="review" rows="5" placeholder="Write your review here..."></textarea>

<button id="submit">Submit Review</button>

<!-- Admin Panel -->
<button id="adminBtn">☰</button>
<div id="adminPanel">
  <h3>Submissions</h3>
  <div id="submissions"></div>
  <button id="closeAdmin">Close</button>
</div>
</body>
</html>
